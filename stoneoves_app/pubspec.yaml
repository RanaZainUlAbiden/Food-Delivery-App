name: stoneoves_app
description: The Stone Oves - Food Delivery App
publish_to: 'none'
version: 1.0.0+1
path_provider: ^2.1.5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  # Video Player — Windows compatible
  # media_kit: ^1.1.11
  # media_kit_video: ^1.2.4
  # media_kit_libs_windows_video: ^1.0.9

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP Client
  dio: ^5.4.3

  # Local Storage
  hive_flutter: ^1.1.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.5

  # Icons
  flutter_svg: ^2.0.10+1

  # Utils
  intl: ^0.19.0
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700